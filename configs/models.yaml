models:
  logistic_l2:
    family: logistic_regression
    scale: true
    select_k:
      default: 5000
      low_dim: 500
    params:
      penalty: l2
      C: 1.0
      solver: liblinear
      max_iter: 2000
      class_weight: balanced
  logistic_elasticnet:
    family: logistic_regression
    scale: true
    select_k:
      default: 3000
      low_dim: 400
    params:
      penalty: elasticnet
      C: 1.0
      solver: saga
      l1_ratio: 0.5
      max_iter: 3000
      class_weight: balanced
  random_forest:
    family: random_forest
    scale: false
    select_k:
      default: 2000
      low_dim: 300
    params:
      n_estimators: 400
      max_depth: 10
      min_samples_leaf: 2
      class_weight: balanced_subsample
  lightgbm:
    family: lightgbm
    scale: false
    select_k:
      default: 5000
      low_dim: 500
    params:
      n_estimators: 300
      learning_rate: 0.05
      num_leaves: 31
      subsample: 0.8
      colsample_bytree: 0.8
      class_weight: balanced
